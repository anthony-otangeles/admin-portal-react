<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Otangeles · Admin Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; color: #1C192E; background: #F7F7F7; }
    button { font-family: 'Inter', sans-serif; }
    input { font-family: 'Inter', sans-serif; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    *::-webkit-scrollbar { width: 10px; height: 10px; }
    *::-webkit-scrollbar-thumb { background: #D1D5DC; border-radius: 9999px; border: 2px solid #F7F7F7; }
    *::-webkit-scrollbar-track { background: transparent; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="primitives.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="shell.jsx"></script>
  <script type="text/babel" src="dashboard.jsx"></script>
  <script type="text/babel" src="users.jsx"></script>
  <script type="text/babel" src="roles.jsx"></script>
  <script type="text/babel" src="portals.jsx"></script>
  <script type="text/babel" src="pages.jsx"></script>

  <script type="text/babel">
    function App() {
      const [page, setPage] = useState('dashboard');
      const [users, setUsers] = useState(USERS);
      const [openUser, setOpenUser] = useState(null);
      const [impersonating, setImpersonating] = useState(null);

      return (
        <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
          <AdminHeader onSwitchView={(role) => setImpersonating(role)} />
          <div style={{ display: 'flex', flex: 1, alignItems: 'flex-start' }}>
            <SideNav active={page} onNav={setPage} />
            {page === 'dashboard' && <AdminDashboard onNav={setPage} />}
            {page === 'users' && <UsersPage users={users} setUsers={setUsers} onOpenUser={setOpenUser} />}
            {page === 'roles' && <RolesPage />}
            {page === 'onboarding' && <OnboardingPage />}
            {page === 'portals' && <PortalsPage />}
            {page === 'compensation' && <CompensationPage />}
            {page === 'notifications' && <NotificationsPage />}
            {page === 'facilities' && <FacilitiesPage />}
            {page === 'analytics' && <AnalyticsPage />}
            {page === 'audit' && <AuditPage />}
            {page === 'settings' && <SettingsPage />}
          </div>
          <UserDrawer user={openUser} onClose={() => setOpenUser(null)}
            onUpdate={(u) => { setUsers(us => us.map(x => x.id === u.id ? u : x)); setOpenUser(u); }}
            onDelete={(id) => { setUsers(us => us.filter(x => x.id !== id)); setOpenUser(null); }} />
          <ImpersonationOverlay role={impersonating} onClose={() => setImpersonating(null)} />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
